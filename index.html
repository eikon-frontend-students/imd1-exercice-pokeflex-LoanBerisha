<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéFlex - Exercice Flexbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header header-flex">
      <h1 class="header-title">PokéFlex</h1>
      <img src="14410-middle.png" alt="Logo Pokémon" />
    </header>

    <main class="main main-flex">
      <section class="search-section search-flex">
        <form class="search-form search-form-flex" id="search-form">
          <label for="pokemon-input" class="search-label">
            Rechercher un Pokémon
          </label>
          <div class="search-input-group search-input-flex">
            <input
              type="text"
              id="pokemon-input"
              class="search-input"
              placeholder="Nom du Pokémon"
              autocomplete="off"
              required
            />
            <button type="submit" class="search-button">Chercher</button>
          </div>
          <p class="search-helper">Ex: Gruikui, Pikachu, Salamèche</p>
        </form>

        <div id="search-history" class="search-history"></div>

        <div id="error-message" class="error-message" hidden></div>
      </section>

      <section id="top-searched" class="top-searched" hidden>
        <h2 class="top-searched-title">Les plus recherchés</h2>
        <div class="top-searched-list"></div>
      </section>

      <div id="type-filters" class="type-filters" hidden></div>

      <section class="cards-section">
        <div class="cards-container cards-flex" id="cards-container"></div>
      </section>
    </main>

    <template id="pokemon-card-template">
      <article class="card card-flex">
        <button type="button" class="card-close" aria-label="Supprimer">
          <img src="pngtree-red-pixel-style-incorrect-cross-mark-icon-png-image_16876081.webp" alt="Supprimer" class="card-close-img" />
        </button>

        <div class="card-image-container card-image-flex">
          <img src="" alt="Image de Pokémon" class="card-image" data-field="image" />
        </div>

        <div class="card-info card-info-flex">
          <h2 class="card-name" data-field="name">Nom du Pokémon</h2>
          <p class="card-id">
            <span class="card-id-label">N°</span>
            <span class="card-id-value" data-field="id">000</span>
          </p>
          <p class="card-generation">
            <span class="card-generation-label">Génération:</span>
            <span class="card-generation-value" data-field="generation">1</span>
          </p>
        </div>

        <div class="card-types card-types-flex" data-field="types-container">
          <span class="type-badge" data-type="type1">Type 1</span>
          <span class="type-badge" data-type="type2">Type 2</span>
        </div>

        <div class="card-stats card-stats-flex">
          <div class="stat-row stat-row-flex">
            <span class="stat-label">PV</span>
            <div class="stat-bar"><div class="stat-bar-fill" data-stat-bar="hp"></div></div>
            <span class="stat-value" data-stat="hp">0</span>
          </div>
          <div class="stat-row stat-row-flex">
            <span class="stat-label">Attaque</span>
            <div class="stat-bar"><div class="stat-bar-fill" data-stat-bar="attack"></div></div>
            <span class="stat-value" data-stat="attack">0</span>
          </div>
          <div class="stat-row stat-row-flex">
            <span class="stat-label">Défense</span>
            <div class="stat-bar"><div class="stat-bar-fill" data-stat-bar="defense"></div></div>
            <span class="stat-value" data-stat="defense">0</span>
          </div>
          <div class="stat-row stat-row-flex">
            <span class="stat-label">Attaque Spé.</span>
            <div class="stat-bar"><div class="stat-bar-fill" data-stat-bar="special-attack"></div></div>
            <span class="stat-value" data-stat="special-attack">0</span>
          </div>
          <div class="stat-row stat-row-flex">
            <span class="stat-label">Défense Spé.</span>
            <div class="stat-bar"><div class="stat-bar-fill" data-stat-bar="special-defense"></div></div>
            <span class="stat-value" data-stat="special-defense">0</span>
          </div>
          <div class="stat-row stat-row-flex">
            <span class="stat-label">Vitesse</span>
            <div class="stat-bar"><div class="stat-bar-fill" data-stat-bar="speed"></div></div>
            <span class="stat-value" data-stat="speed">0</span>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
